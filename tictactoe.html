<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 450px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: #667eea;
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
    }

    .scores {
      display: flex;
      justify-content: space-around;
      margin-bottom: 2rem;
      background: #f8f9fa;
      padding: 1rem;
      border-radius: 12px;
    }

    .score-box {
      text-align: center;
    }

    .score-label {
      font-size: 0.85rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .score-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: #667eea;
    }

    .status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5rem;
      color: #333;
      font-weight: 600;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 2rem;
      background: #f0f0f0;
      padding: 12px;
      border-radius: 12px;
    }

    .cell {
      aspect-ratio: 1;
      font-size: 2.5rem;
      font-weight: bold;
      background: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #667eea;
    }

    .cell:hover:not(:disabled) {
      background: #f0f0f0;
      transform: scale(1.05);
    }

    .cell:disabled {
      cursor: default;
    }

    .cell.x {
      color: #e74c3c;
    }

    .cell.o {
      color: #3498db;
    }

    .cell.winner {
      background: #ffd700;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      animation: pulse 0.6s ease;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .btn-primary {
      background: #667eea;
      color: white;
      flex: 1;
      min-width: 120px;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #e8eaf6;
      color: #667eea;
      flex: 1;
      min-width: 120px;
    }

    .btn-secondary:hover {
      background: #d1d5f0;
      transform: translateY(-2px);
    }

    .btn-secondary.active {
      background: #667eea;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tic Tac Toe</h1>

    <div class="scores">
      <div class="score-box">
        <div class="score-label">X</div>
        <div class="score-value" id="score-x">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">Draws</div>
        <div class="score-value" id="score-d">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">O</div>
        <div class="score-value" id="score-o">0</div>
      </div>
    </div>

    <div class="status" id="status"></div>

    <div class="board" id="board">
      <button class="cell" data-i="0"></button>
      <button class="cell" data-i="1"></button>
      <button class="cell" data-i="2"></button>
      <button class="cell" data-i="3"></button>
      <button class="cell" data-i="4"></button>
      <button class="cell" data-i="5"></button>
      <button class="cell" data-i="6"></button>
      <button class="cell" data-i="7"></button>
      <button class="cell" data-i="8"></button>
    </div>

    <div class="controls">
      <button class="btn-primary" id="reset-btn">New Game</button>
      <button class="btn-secondary" id="mode-btn">vs AI: OFF</button>
    </div>
  </div>

  <script>
    const WINS = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];

    let board, currentPlayer, gameOver, vsAI;
    let scores = { X: 0, O: 0, D: 0 };
    let winnerLine = [];

    const cells = document.querySelectorAll('.cell');
    const statusEl = document.getElementById('status');
    const scoreXEl = document.getElementById('score-x');
    const scoreOEl = document.getElementById('score-o');
    const scoreDEl = document.getElementById('score-d');
    const resetBtn = document.getElementById('reset-btn');
    const modeBtn = document.getElementById('mode-btn');

    function init() {
      board = Array(9).fill(null);
      currentPlayer = 'X';
      gameOver = false;
      winnerLine = [];
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
        cell.disabled = false;
      });
      updateStatus();
    }

    function updateStatus() {
      if (gameOver) return;
      statusEl.textContent = `${currentPlayer}'s turn${vsAI && currentPlayer === 'O' ? ' (AI)' : ''}`;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(cell => cell !== null)) {
        return { winner: null, line: [], isDraw: true };
      }
      return null;
    }

    function endGame(result) {
      gameOver = true;
      winnerLine = result.line;

      if (result.winner) {
        statusEl.textContent = `${result.winner} wins! 🎉`;
        scores[result.winner]++;
        result.line.forEach(i => cells[i].classList.add('winner'));
      } else {
        statusEl.textContent = "It's a draw!";
        scores.D++;
      }

      scoreXEl.textContent = scores.X;
      scoreOEl.textContent = scores.O;
      scoreDEl.textContent = scores.D;
      cells.forEach(cell => cell.disabled = true);
    }

    function play(index) {
      if (board[index] || gameOver) return;

      board[index] = currentPlayer;
      cells[index].textContent = currentPlayer;
      cells[index].classList.add(currentPlayer.toLowerCase());

      const result = checkWinner();
      if (result) {
        endGame(result);
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      updateStatus();

      if (vsAI && currentPlayer === 'O' && !gameOver) {
        cells.forEach(cell => cell.disabled = true);
        setTimeout(() => {
          const move = getBestMove();
          cells.forEach(cell => cell.disabled = false);
          play(move);
        }, 500);
      }
    }

    function minimax(depth, isMax) {
      const result = checkWinner();
      if (result?.winner === 'O') return 10 - depth;
      if (result?.winner === 'X') return depth - 10;
      if (result?.isDraw) return 0;

      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (board[i] === null) {
            board[i] = 'O';
            best = Math.max(best, minimax(depth + 1, false));
            board[i] = null;
          }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (board[i] === null) {
            board[i] = 'X';
            best = Math.min(best, minimax(depth + 1, true));
            board[i] = null;
          }
        }
        return best;
      }
    }

    function getBestMove() {
      let best = -Infinity, chosen = -1;
      for (let i = 0; i < 9; i++) {
        if (board[i] === null) {
          board[i] = 'O';
          const score = minimax(0, false);
          board[i] = null;
          if (score > best) {
            best = score;
            chosen = i;
          }
        }
      }
      return chosen;
    }

    function handleClick(e) {
      const index = +e.target.dataset.i;
      if (vsAI && currentPlayer === 'O') return;
      play(index);
    }

    cells.forEach(cell => cell.addEventListener('click', handleClick));

    resetBtn.addEventListener('click', init);

    modeBtn.addEventListener('click', () => {
      vsAI = !vsAI;
      modeBtn.textContent = `vs AI: ${vsAI ? 'ON' : 'OFF'}`;
      modeBtn.classList.toggle('active', vsAI);
      init();
    });

    vsAI = false;
    init();
  </script>
</body>
</html>
