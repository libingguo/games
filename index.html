<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a1a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }

    h1 {
      font-size: 3rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #e0e0ff;
      text-shadow: 0 0 20px rgba(120, 120, 255, 0.6);
    }

    .games {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      width: 220px;
      height: 220px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      text-decoration: none;
      color: #fff;
      transition: transform 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(120, 120, 255, 0.7);
      background: rgba(120, 120, 255, 0.12);
      box-shadow: 0 8px 32px rgba(80, 80, 255, 0.25);
    }

    .card .icon {
      font-size: 4rem;
      line-height: 1;
    }

    .card .label {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <h1>Games</h1>
  <div class="games">
    <a class="card" href="tictactoe.html">
      <span class="icon">⭕</span>
      <span class="label">Tic-Tac-Toe</span>
    </a>
    <a class="card" href="shooter2.html">
      <span class="icon">🚀</span>
      <span class="label">Shooter</span>
    </a>
  </div>
</body>
</html>
